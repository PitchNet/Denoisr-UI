<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Shadows · warm, layered</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding-top:6px">
    
      <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <div style="width:100%;height:64px;background:#fff;border-radius:14px;box-shadow:0 1px 0 rgba(0,0,0,.04), 0 20px 50px -20px rgba(40,30,20,.18), 0 0 0 1px rgba(20,20,20,.04)"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:#1a1715;text-align:center">--shadow-card</div>
        <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.5);text-align:center">cards</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <div style="width:100%;height:64px;background:#fff;border-radius:14px;box-shadow:0 1px 0 rgba(0,0,0,.02), 0 10px 30px -10px rgba(40,30,20,.06)"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:#1a1715;text-align:center">--shadow-panel</div>
        <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.5);text-align:center">dashboard panels</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <div style="width:100%;height:64px;background:#fff;border-radius:14px;box-shadow:0 4px 16px rgba(40,30,20,.08)"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:#1a1715;text-align:center">--shadow-button</div>
        <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.5);text-align:center">action buttons</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <div style="width:100%;height:64px;background:#fff;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.15)"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:#1a1715;text-align:center">--shadow-float</div>
        <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.5);text-align:center">avatars in match moment</div>
      </div>
    
  </div></div></body></html>
