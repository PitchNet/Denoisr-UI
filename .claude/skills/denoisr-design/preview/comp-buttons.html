<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Buttons</div>
  <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
    <button style="height:52px;padding:0 22px;border-radius:14px;border:none;background:#1a1715;color:#fbfaf6;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer">Apply filter</button>
    <button style="height:52px;padding:0 22px;border-radius:14px;border:1px solid rgba(26,23,21,.1);background:#fff;color:#1a1715;font-family:inherit;font-size:14px;cursor:pointer">Skip</button>
    <button style="height:56px;padding:0 28px;border-radius:999px;border:none;background:#1a1715;color:#fbfaf6;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer">Send opener</button>
    <button style="height:48px;padding:0 22px;border-radius:999px;border:1px solid rgba(26,23,21,.12);background:transparent;color:#1a1715;font-family:inherit;font-size:14px;cursor:pointer">Write your own</button>
  </div>
  <div class="meta">Primary on ink. Secondary on hairline. Pill for CTA. Sentence case, full stop optional.</div></div></body></html>
