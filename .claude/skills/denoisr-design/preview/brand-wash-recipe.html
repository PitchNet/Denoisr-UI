<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Pastel wash recipe</div>
  <div style="position:relative;height:140px;border-radius:14px;background:#fbfaf6;border:1px solid rgba(26,23,21,.06);overflow:hidden">
    <div style="position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,210,225,.55),transparent 70%)"></div>
    <div style="position:absolute;bottom:-50px;left:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(closest-side,rgba(220,210,255,.5),transparent 70%)"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.55);letter-spacing:1px">PINK · TOP-RIGHT &nbsp; / &nbsp; VIOLET · BOTTOM-LEFT</div>
  </div>
  <div class="meta">Two 200px circles, offset off-edge. radial-gradient(closest-side, color, transparent 70%). No more, no less.</div></div></body></html>
