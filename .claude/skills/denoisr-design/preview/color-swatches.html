<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
  .row{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
  .wash-pink{position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,210,225,.55),transparent 70%);pointer-events:none}
  .wash-violet{position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(closest-side,rgba(220,210,255,.5),transparent 70%);pointer-events:none}
</style></head><body><div class="card">
  <div class="eyebrow">Avatar swatches · oklch, constant L</div>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:8px">
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.78 0.10 220);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">01</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">220°</div>
  </div>
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.80 0.11 65);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">02</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">65°</div>
  </div>
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.82 0.08 150);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">03</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">150°</div>
  </div>
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.80 0.08 30);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">04</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">30°</div>
  </div>
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.78 0.10 320);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">05</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">320°</div>
  </div>
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.80 0.09 200);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">06</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">200°</div>
  </div>
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.80 0.08 90);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">07</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">90°</div>
  </div>
    
  <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
    <div style="height:60px;border-radius:10px;background:oklch(0.78 0.10 250);border:1px solid rgba(26,23,21,.06)"></div>
    <div style="font-family:'Geist Mono';font-size:10.5px;color:#1a1715">08</div>
    <div style="font-family:'Geist Mono';font-size:9.5px;color:rgba(26,23,21,.55)">250°</div>
  </div>
  </div>
  <div class="meta">Eight stops walking the hue wheel at L≈0.80. Used for avatars and company chips.</div></div></body></html>
