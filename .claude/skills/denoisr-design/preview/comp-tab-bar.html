<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Mobile tab bar</div>
  <div style="padding:12px 18px;background:rgba(247,245,241,.85);backdrop-filter:blur(20px);border-top:1px solid rgba(26,23,21,.06);border-radius:18px;display:flex;justify-content:space-around;max-width:520px;border:1px solid rgba(26,23,21,.06)">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#1a1715">
        <div style="width:22px;height:22px;border-radius:5px;background:currentColor;opacity:.7"></div>
        <div style="font-family:'Geist Mono';font-size:9px;letter-spacing:1.2px;text-transform:uppercase">Discover</div>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(26,23,21,.4)">
        <div style="width:22px;height:22px;border-radius:5px;background:currentColor;opacity:.7"></div>
        <div style="font-family:'Geist Mono';font-size:9px;letter-spacing:1.2px;text-transform:uppercase">Matches</div>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(26,23,21,.4)">
        <div style="width:22px;height:22px;border-radius:5px;background:currentColor;opacity:.7"></div>
        <div style="font-family:'Geist Mono';font-size:9px;letter-spacing:1.2px;text-transform:uppercase">Inbox</div>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(26,23,21,.4)">
        <div style="width:22px;height:22px;border-radius:5px;background:currentColor;opacity:.7"></div>
        <div style="font-family:'Geist Mono';font-size:9px;letter-spacing:1.2px;text-transform:uppercase">You</div>
      </div>
    
  </div>
  <div class="meta">Frosted, 85% opacity, 20px backdrop blur. Active = ink; idle = ink-4.</div></div></body></html>
