<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
  .row{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
  .wash-pink{position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,210,225,.55),transparent 70%);pointer-events:none}
  .wash-violet{position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(closest-side,rgba(220,210,255,.5),transparent 70%);pointer-events:none}
</style></head><body><div class="card">
  <div class="eyebrow">Type · families</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:end">
    <div>
      <div style="font-family:'Geist';font-size:44px;font-weight:600;letter-spacing:-1.5px;line-height:1">Geist</div>
      <div class="meta" style="margin-top:6px">Sans · workhorse · 400 / 500 / 600 / 700</div>
    </div>
    <div>
      <div style="font-family:'Geist Mono';font-size:32px;font-weight:500;letter-spacing:-0.5px;line-height:1">Geist Mono</div>
      <div class="meta" style="margin-top:6px">Mono · signal · eyebrows, metadata, numerals</div>
    </div>
    <div>
      <div style="font-family:'Instrument Serif';font-style:italic;font-size:42px;font-weight:400;letter-spacing:-1px;line-height:1">Instrument</div>
      <div class="meta" style="margin-top:6px">Serif italic · accent · pull quotes only</div>
    </div>
  </div></div></body></html>
