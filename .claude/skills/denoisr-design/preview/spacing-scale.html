<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Spacing scale · 4px base</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-1</div>
        <div style="height:14px;width:4px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">4px</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-2</div>
        <div style="height:14px;width:8px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">8px</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-3</div>
        <div style="height:14px;width:12px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">12px</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-4</div>
        <div style="height:14px;width:16px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">16px</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-5</div>
        <div style="height:14px;width:22px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">22px</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-6</div>
        <div style="height:14px;width:26px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">26px</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-7</div>
        <div style="height:14px;width:36px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">36px</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-family:'Geist Mono';font-size:11px;color:rgba(26,23,21,.5);width:80px">--space-8</div>
        <div style="height:14px;width:52px;background:#1a1715;border-radius:2px"></div>
        <div style="font-family:'Geist Mono';font-size:11px;color:#1a1715">52px</div>
      </div>
    
  </div></div></body></html>
