<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Avatar · letterform on swatch</div>
  <div style="display:flex;gap:14px;align-items:center">
    
      <div style="width:86px;height:86px;border-radius:50%;background:oklch(0.78 0.10 320);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;letter-spacing:-0.5px;box-shadow:0 8px 20px -8px rgba(0,0,0,.25)">IO</div>
    
      <div style="width:64px;height:64px;border-radius:50%;background:oklch(0.80 0.09 200);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;letter-spacing:-0.5px;box-shadow:0 8px 20px -8px rgba(0,0,0,.25)">DS</div>
    
      <div style="width:50px;height:50px;border-radius:50%;background:oklch(0.80 0.08 90);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;letter-spacing:-0.5px;box-shadow:0 8px 20px -8px rgba(0,0,0,.25)">PR</div>
    
      <div style="width:36px;height:36px;border-radius:50%;background:oklch(0.78 0.10 220);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;letter-spacing:-0.5px;box-shadow:0 8px 20px -8px rgba(0,0,0,.25)">NM</div>
    
  </div>
  <div class="meta">Always circle. Always 1–2 letter initials on a swatch. Editorial Mono uses 600 weight, white text. No emoji, no icons.</div></div></body></html>
