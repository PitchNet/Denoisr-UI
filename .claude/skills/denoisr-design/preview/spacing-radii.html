<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Corner radii</div>
  <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
    
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:#1a1715;border-radius:4px"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:rgba(26,23,21,.55)">xs · 4px</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:#1a1715;border-radius:10px"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:rgba(26,23,21,.55)">sm · 10px</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:#1a1715;border-radius:14px"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:rgba(26,23,21,.55)">md · 14px</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:#1a1715;border-radius:18px"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:rgba(26,23,21,.55)">lg · 18px</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:#1a1715;border-radius:22px"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:rgba(26,23,21,.55)">xl · 22px</div>
      </div>
    
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:#1a1715;border-radius:24px"></div>
        <div style="font-family:'Geist Mono';font-size:10px;color:rgba(26,23,21,.55)">2xl · 24px</div>
      </div>
    
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:120px;height:38px;background:#1a1715;border-radius:999px"></div>
      <div style="font-family:'Geist Mono';font-size:10px;color:rgba(26,23,21,.55)">pill · 999</div>
    </div>
  </div></div></body></html>
