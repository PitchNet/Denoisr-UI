<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Anti-patterns · the things we never do</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
    
      <div style="padding:14px;border-radius:10px;background:linear-gradient(90deg,#7c3aed,#ec4899);border:1px solid rgba(26,23,21,.06);position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;min-height:54px;text-align:center">
        Gradient buttons
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 60" preserveAspectRatio="none">
          <line x1="0" y1="60" x2="100" y2="0" stroke="#c44a39" stroke-width="0.6"/>
        </svg>
      </div>
    
      <div style="padding:14px;border-radius:10px;background:#fff;border:1px solid rgba(26,23,21,.06);position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;color:#1a1715;min-height:54px;text-align:center">
        Left-accent cards
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 60" preserveAspectRatio="none">
          <line x1="0" y1="60" x2="100" y2="0" stroke="#c44a39" stroke-width="0.6"/>
        </svg>
      </div>
    
      <div style="padding:14px;border-radius:10px;background:#ffffff;border:1px solid rgba(26,23,21,.06);position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;color:#1a1715;min-height:54px;text-align:center">
        Pure white surfaces
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 60" preserveAspectRatio="none">
          <line x1="0" y1="60" x2="100" y2="0" stroke="#c44a39" stroke-width="0.6"/>
        </svg>
      </div>
    
      <div style="padding:14px;border-radius:10px;background:#fbfaf6;border:1px solid rgba(26,23,21,.06);position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;color:#1a1715;min-height:54px;text-align:center">
        Emoji 🎉
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 60" preserveAspectRatio="none">
          <line x1="0" y1="60" x2="100" y2="0" stroke="#c44a39" stroke-width="0.6"/>
        </svg>
      </div>
    
      <div style="padding:14px;border-radius:10px;background:#fbfaf6;border:1px solid rgba(26,23,21,.06);position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;color:#1a1715;min-height:54px;text-align:center">
        Title Case Headlines
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 60" preserveAspectRatio="none">
          <line x1="0" y1="60" x2="100" y2="0" stroke="#c44a39" stroke-width="0.6"/>
        </svg>
      </div>
    
      <div style="padding:14px;border-radius:10px;background:#fbfaf6;border:1px solid rgba(26,23,21,.06);position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;color:#1a1715;min-height:54px;text-align:center">
        Hand-drawn SVGs
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 60" preserveAspectRatio="none">
          <line x1="0" y1="60" x2="100" y2="0" stroke="#c44a39" stroke-width="0.6"/>
        </svg>
      </div>
    
  </div></div></body></html>
