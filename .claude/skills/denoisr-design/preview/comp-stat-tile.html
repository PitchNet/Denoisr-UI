<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Stat tile</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px">
    
      <div style="padding:14px 14px;border-radius:14px;background:#fbfaf6;border:1px solid rgba(26,23,21,.06)">
        <div style="font-family:'Geist Mono';font-size:9.5px;letter-spacing:1.2px;color:rgba(26,23,21,.5);text-transform:uppercase">Experience</div>
        <div style="margin-top:6px;font-size:26px;font-weight:500;letter-spacing:-0.8px;color:#1a1715">5<span style="font-size:12px;color:rgba(26,23,21,.5);margin-left:4px">years</span></div>
      </div>
    
      <div style="padding:14px 14px;border-radius:14px;background:#fbfaf6;border:1px solid rgba(26,23,21,.06)">
        <div style="font-family:'Geist Mono';font-size:9.5px;letter-spacing:1.2px;color:rgba(26,23,21,.5);text-transform:uppercase">Comp band</div>
        <div style="margin-top:6px;font-size:26px;font-weight:500;letter-spacing:-0.8px;color:#1a1715">€95–120<span style="font-size:12px;color:rgba(26,23,21,.5);margin-left:4px">k</span></div>
      </div>
    
  </div></div></body></html>
