<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Decision stamps · only during drag</div>
  <div style="display:flex;gap:18px;align-items:center;padding:14px 0">
    <div style="padding:6px 16px;border:2.5px solid #c44a39;color:#c44a39;border-radius:6px;transform:rotate(-14deg);font-family:'Geist Mono';font-size:18px;font-weight:700;letter-spacing:2px">SKIP</div>
    <div style="padding:6px 16px;border:2.5px solid #2c8a55;color:#2c8a55;border-radius:6px;transform:rotate(14deg);font-family:'Geist Mono';font-size:18px;font-weight:700;letter-spacing:2px">LIKE</div>
    <div style="padding:6px 16px;border:2.5px solid #1a1715;color:#1a1715;border-radius:6px;transform:rotate(-3deg);font-family:'Geist Mono';font-size:18px;font-weight:700;letter-spacing:2px">BOOST</div>
  </div>
  <div class="meta">Appear at 80px drag threshold. The rotation direction telegraphs the swipe axis.</div></div></body></html>
