<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:#fbfaf6;color:#1a1715;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .card{padding:22px 26px;min-height:100%;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.5)}
  .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:rgba(26,23,21,.5)}
</style></head><body><div class="card">
  <div class="eyebrow">Slider</div>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:520px">
    <div style="display:flex;justify-content:space-between">
      <div style="font-family:'Geist Mono';font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(26,23,21,.55)">Experience required</div>
      <div style="font-size:13px;color:#1a1715">Up to 7 years</div>
    </div>
    <div style="height:8px;background:rgba(26,23,21,.08);border-radius:999px;position:relative">
      <div style="position:absolute;left:0;top:0;bottom:0;width:35%;background:#1a1715;border-radius:999px"></div>
      <div style="position:absolute;left:calc(35% - 11px);top:-7px;width:22px;height:22px;border-radius:50%;background:#fff;border:1px solid rgba(26,23,21,.18);box-shadow:0 2px 8px rgba(0,0,0,.1)"></div>
    </div>
  </div></div></body></html>
